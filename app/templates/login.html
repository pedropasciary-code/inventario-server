<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDP SYSTEM - Login</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="auth-page">
    <main class="auth-card">
        <div class="brand">
            <img class="brand-logo" src="/static/logo/logo-rdp.png" alt="RDP SYSTEM">
            <h1>RDP SYSTEM</h1>
            <p>Painel de Inventário de Ativos</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="field">
                <label for="username">Usuario</label>
                <input id="username" type="text" name="username" required autocomplete="username">
            </div>

            <div class="field">
                <label for="password">Senha</label>
                <input id="password" type="password" name="password" required autocomplete="current-password">
            </div>

            <button class="button full" type="submit">Entrar</button>
        </form>

        <div class="footer-note">RDP SYSTEM - Inventario Corporativo</div>
    </main>
</body>
</html>
