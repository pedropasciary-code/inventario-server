<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Inventário</title>
</head>
<body>
    <h1>Login</h1>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login">
        <div>
            <label>Usuário</label>
            <input type="text" name="username" required>
        </div>
        <br>
        <div>
            <label>Senha</label>
            <input type="password" name="password" required>
        </div>
        <br>
        <button type="submit">Entrar</button>
    </form>
</body>
</html>
