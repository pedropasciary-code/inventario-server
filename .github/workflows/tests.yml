name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite://
      AGENT_TOKEN: test-agent-token
      SECRET_KEY: test-secret-key
      SESSION_COOKIE_SECURE: "false"
      APP_TIMEZONE: America/Sao_Paulo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Python modules
        run: |
          python -m py_compile app/main.py app/models.py app/schemas.py app/auth.py app/config.py app/database.py create_user.py agent/agent.py agent/collector.py agent/sender.py

      - name: Validate Alembic heads
        run: |
          python -m alembic heads

      - name: Run tests
        run: |
          python -m pytest
