name: Tests

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite://
      AGENT_TOKEN: test-agent-token
      SECRET_KEY: test-secret-key
      SESSION_COOKIE_SECURE: "false"
      APP_TIMEZONE: America/Sao_Paulo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Python modules
        run: |
          python -m py_compile app/main.py app/models.py app/schemas.py app/auth.py app/config.py app/database.py create_user.py

      - name: Validate Alembic heads
        run: |
          python -m alembic heads

      - name: Run tests
        run: |
          python -m pytest

  agent-build:
    name: Agent build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-agent.txt

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-agent.txt

      - name: Build agent executable
        run: |
          python -m PyInstaller rdp-agent.spec

      - name: Smoke test agent executable
        run: |
          dist\rdp-agent.exe --help

      - name: Upload agent executable
        uses: actions/upload-artifact@v4
        with:
          name: rdp-agent-windows
          path: dist/rdp-agent.exe
